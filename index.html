<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MyCloud - Fast Storage</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzjnGbpvLOeD9qEtSrjXpwZN4GPItU1wA",
            authDomain: "mycloud-649c5.firebaseapp.com",
            projectId: "mycloud-649c5",
            storageBucket: "mycloud-649c5.firebasestorage.app",
            messagingSenderId: "792370200055",
            appId: "1:792370200055:web:975757a5425d2a0a5282f2",
            measurementId: "G-9ZMVC57VVS"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        window.uploadFile = async () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return alert("Pilih file dulu!");

            const storageRef = ref(storage, 'configs/' + file.name);
            alert("Sedang mengupload...");
            
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            
            document.getElementById('result').innerHTML = `Upload sukses! Link: <a href="${url}" target="_blank">${url}</a>`;
        };
    </script>
</head>
<body style="background:#121212; color:white; font-family:sans-serif; padding:20px;">
    <h2>MyCloud Upload</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Mulai Upload</button>
    <div id="result" style="margin-top:20px; color:#4fa3ff;"></div>
</body>
</html>
