<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Storage Keren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sembunyikan elemen secara default untuk sistem Tab */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <nav class="bg-gray-800 p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">MyCloud</h1>
        
        <div class="flex flex-col items-center cursor-pointer">
            <div id="profile-pic" class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-lg font-bold">
                A </div>
            <span class="text-sm mt-1 text-gray-300">AkunSaya</span>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-8 p-4">
        <div class="flex space-x-4 border-b border-gray-700 pb-2 mb-6">
            <button onclick="openTab('upload')" class="text-blue-400 font-semibold hover:text-blue-300 transition">Upload File</button>
            <button onclick="openTab('download')" class="text-green-400 font-semibold hover:text-green-300 transition">Download</button>
            <button onclick="openTab('myfiles')" class="text-yellow-400 font-semibold hover:text-yellow-300 transition">File Saya (0/500MB)</button>
        </div>

        <div id="upload" class="tab-content active bg-gray-800 p-6 rounded-lg shadow-md">
            <h2 class="text-2xl mb-4 font-bold">Upload File</h2>
            <p class="text-gray-400 text-sm mb-4">Maksimal file 5MB. Batas akun 500MB.</p>
            
            <label class="block mb-2">Pilih Kategori:</label>
            <select id="kategori" class="w-full p-2 rounded bg-gray-700 border border-gray-600 mb-4 focus:outline-none focus:border-blue-500">
                <option value="config">Config</option>
                <option value="foto">Foto</option>
                <option value="script">Script</option>
                <option value="document">Document</option>
            </select>

            <input type="file" id="fileInput" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold w-full mb-4">
                PILIH FILE...
            </button>
            
            <button onclick="simulateUpload()" class="border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white px-4 py-2 rounded w-full transition">
                Mulai Upload
            </button>

            <div id="loadingArea" class="mt-4 hidden">
                <p class="text-sm mb-1" id="uploadStatus">Mengunggah... 0%</p>
                <div class="w-full bg-gray-700 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="download" class="tab-content bg-gray-800 p-6 rounded-lg shadow-md">
            <h2 class="text-2xl mb-4 font-bold border-b border-gray-700 pb-2">DOWNLOAD</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <button class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-left flex justify-between items-center">
                    <span class="font-bold text-lg">⚙️ Config</span>
                    <span class="text-xs bg-gray-900 px-2 py-1 rounded">Buka Tab</span>
                </button>
                <button class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-left flex justify-between items-center">
                    <span class="font-bold text-lg">🖼️ Foto</span>
                    <span class="text-xs bg-gray-900 px-2 py-1 rounded">Buka Tab</span>
                </button>
                <button class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-left flex justify-between items-center">
                    <span class="font-bold text-lg">📜 Script</span>
                    <span class="text-xs bg-gray-900 px-2 py-1 rounded">Buka Tab</span>
                </button>
                <button class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-left flex justify-between items-center">
                    <span class="font-bold text-lg">📄 Document</span>
                    <span class="text-xs bg-gray-900 px-2 py-1 rounded">Buka Tab</span>
                </button>
            </div>
        </div>

        <div id="myfiles" class="tab-content bg-gray-800 p-6 rounded-lg shadow-md">
            <h2 class="text-2xl mb-4 font-bold text-red-400">Peringatan Kuota!</h2>
            <p class="text-gray-300 mb-4">Penyimpanan Anda hampir mencapai 500MB. Silakan hapus file lama untuk mengunggah file baru.</p>
            
            <ul class="divide-y divide-gray-700">
                <li class="py-3 flex justify-between items-center">
                    <span>script_bot.js (2.5 MB)</span>
                    <button class="text-red-500 hover:text-red-400 font-bold">Hapus</button>
                </li>
                <li class="py-3 flex justify-between items-center">
                    <span>config_game.json (1.2 MB)</span>
                    <button class="text-red-500 hover:text-red-400 font-bold">Hapus</button>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // Logika Pindah Tab
        function openTab(tabName) {
            let contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
        }

        // Simulasi Loading Upload (Frontend Saja)
        function simulateUpload() {
            let fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert("Pilih file terlebih dahulu!");
                return;
            }

            let file = fileInput.files[0];
            if (file.size > 5 * 1024 * 1024) {
                alert("Gagal: Ukuran file lebih dari 5MB!");
                return;
            }

            let loadingArea = document.getElementById('loadingArea');
            let progressBar = document.getElementById('progressBar');
            let uploadStatus = document.getElementById('uploadStatus');
            
            loadingArea.classList.remove('hidden');
            let width = 0;
            
            // Simulasi progress berjalan
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    uploadStatus.innerText = "Upload Selesai!";
                    setTimeout(() => {
                        loadingArea.classList.add('hidden');
                        progressBar.style.width = '0%';
                        uploadStatus.innerText = "Mengunggah... 0%";
                        alert("File berhasil diupload ke kategori: " + document.getElementById('kategori').value);
                    }, 1000);
                } else {
                    width += Math.floor(Math.random() * 10) + 5; // kecepatan random
                    if (width > 100) width = 100;
                    progressBar.style.width = width + '%';
                    uploadStatus.innerText = `Mengunggah... ${width}%`;
                }
            }, 300); // Update setiap 300ms
        }
    </script>
</body>
</html>
