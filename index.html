<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon X Hunter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nav-blue: #007bff; --border-color: #ddd; --success: #28a745; --danger: #dc3545; }
        body { font-family: sans-serif; margin: 0; background: #f8f9fa; }
        
        /* Navigasi Bar */
        .navbar { background: var(--nav-blue); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .tabs { display: flex; justify-content: space-around; background: white; border-bottom: 1px solid var(--border-color); padding: 10px; }
        .tab-item { cursor: pointer; color: gray; }
        .tab-item.active { color: var(--nav-blue); border-bottom: 2px solid var(--nav-blue); }
        .view-section { display: none; padding: 15px; }
        .view-section.active { display: block; }

        /* Chat Layout (Telegram Style) */
        .chat-layout { display: flex; height: 70vh; background: white; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); position: relative; }
        .chat-list { width: 100%; transition: all 0.25s ease; overflow-y: auto; }
        .chat-room { width: 100%; position: absolute; right: -100%; top: 0; height: 100%; display: flex; flex-direction: column; background: #f4f7f9; transition: all 0.25s ease; z-index: 5; }
        .chat-layout.room-active .chat-list { transform: translateX(-100%); }
        .chat-layout.room-active .chat-room { right: 0; }
        .chat-user-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .chat-window-header { padding: 10px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { max-width: 80%; padding: 10px; border-radius: 15px; font-size: 14px; }
        .left { background: white; align-self: flex-start; }
        .right { background: #dcf8c6; align-self: flex-end; }
        .chat-bottom-input { padding: 10px; background: white; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px; outline: none; }
    </style>
</head>
<body>

<div class="navbar">Neon X Hunter</div>
<div class="tabs">
    <div class="tab-item active" onclick="showTab('view-home')"><i class="fas fa-home"></i></div>
    <div class="tab-item" onclick="showTab('view-profile')"><i class="fas fa-user"></i></div>
    <div class="tab-item" onclick="showTab('view-chat')"><i class="fas fa-handshake"></i></div>
    <div class="tab-item" onclick="showTab('view-notif')"><i class="fas fa-bell"></i></div>
</div>

<section id="view-home" class="view-section active"><h3>Selamat Datang di Neon X Hunter</h3></section>
<section id="view-profile" class="view-section"><h3>Profil Pengguna</h3></section>

<!-- SECTION CHAT -->
<section id="view-chat" class="view-section">
    <div class="chat-layout" id="chatContainerLayout">
        <div class="chat-list">
            <div class="chat-user-item" onclick="openChat('Budi Santoso')">
                <div style="width:40px;height:40px;background:blue;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;">B</div>
                <div><strong>Budi Santoso</strong><br><small>Online</small></div>
            </div>
        </div>
        <div class="chat-room">
            <div class="chat-window-header">
                <button onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
                <span id="chatName"></span>
            </div>
            <div class="chat-messages" id="msgArea"></div>
            <div class="chat-bottom-input">
                <input type="text" id="inp" placeholder="Ketik pesan...">
                <button onclick="send()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</section>

<script>
    function showTab(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function openChat(name) {
        document.getElementById('chatName').innerText = name;
        document.getElementById('chatContainerLayout').classList.add('room-active');
        document.getElementById('msgArea').innerHTML = '<div class="chat-bubble left">Halo, apa kabar?</div>';
    }
    function closeChat() { document.getElementById('chatContainerLayout').classList.remove('room-active'); }
    function send() {
        let val = document.getElementById('inp').value;
        if(val) {
            document.getElementById('msgArea').innerHTML += `<div class="chat-bubble right">${val}</div>`;
            document.getElementById('inp').value = '';
        }
    }
</script>
</body>
</html>
